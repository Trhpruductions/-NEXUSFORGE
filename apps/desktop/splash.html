<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexusForge Startup</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #030712;
        --panel: rgba(15, 23, 42, 0.52);
        --line: rgba(34, 211, 238, 0.35);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #22d3ee;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 16% 8%, rgba(34, 211, 238, 0.16), transparent 35%),
          radial-gradient(circle at 84% 82%, rgba(99, 102, 241, 0.2), transparent 34%),
          linear-gradient(165deg, #020617 0%, #020a18 58%, #031024 100%);
        color: var(--text);
        font-family: "Segoe UI", "Inter", sans-serif;
      }

      .particle {
        position: absolute;
        width: 3px;
        height: 3px;
        border-radius: 999px;
        background: rgba(34, 211, 238, 0.75);
        box-shadow: 0 0 14px rgba(34, 211, 238, 0.75);
        animation: drift linear infinite;
      }

      @keyframes drift {
        from {
          transform: translateY(0) translateX(0);
          opacity: 0;
        }
        20% {
          opacity: 1;
        }
        80% {
          opacity: 1;
        }
        to {
          transform: translateY(-120px) translateX(24px);
          opacity: 0;
        }
      }

      .card {
        position: relative;
        width: min(760px, 92vw);
        border: 1px solid var(--line);
        border-radius: 20px;
        background: var(--panel);
        -webkit-backdrop-filter: blur(12px);
        backdrop-filter: blur(12px);
        padding: 34px 34px 28px;
        box-shadow:
          0 24px 60px rgba(2, 6, 23, 0.46),
          inset 0 1px 0 rgba(148, 163, 184, 0.15);
      }

      .glow {
        position: absolute;
        inset: -130px -120px auto;
        height: 220px;
        background: radial-gradient(circle at 50% 50%, rgba(34, 211, 238, 0.25), transparent 62%);
        pointer-events: none;
        filter: blur(12px);
      }

      .eyebrow {
        margin: 0;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.22em;
        color: #67e8f9;
      }

      h1 {
        margin: 10px 0 10px;
        font-size: 58px;
        line-height: 0.94;
        letter-spacing: -0.02em;
        opacity: 0;
        transform: translateY(10px);
        animation: reveal 0.75s ease forwards;
      }

      @keyframes reveal {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .subtitle {
        margin: 0 0 20px;
        color: var(--muted);
        max-width: 530px;
      }

      .loader {
        margin-top: 10px;
        border: 1px solid rgba(71, 85, 105, 0.7);
        border-radius: 14px;
        background: rgba(2, 6, 23, 0.55);
        padding: 12px 14px;
      }

      .phase {
        font-size: 15px;
        color: #a5f3fc;
        min-height: 22px;
      }

      .bar {
        margin-top: 10px;
        height: 6px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(30, 41, 59, 0.9);
      }

      .bar > span {
        display: block;
        height: 100%;
        width: 16%;
        border-radius: inherit;
        background: linear-gradient(90deg, rgba(34, 211, 238, 0.55), rgba(99, 102, 241, 0.88));
        box-shadow: 0 0 18px rgba(34, 211, 238, 0.4);
        animation: load 4.8s ease forwards;
      }

      @keyframes load {
        to {
          width: 100%;
        }
      }

      .tips {
        margin-top: 14px;
        font-size: 12px;
        color: #93c5fd;
      }
    </style>
  </head>
  <body>
    <div id="particles"></div>
    <main class="card">
      <div class="glow"></div>
      <p class="eyebrow">NexusForge Command Home</p>
      <h1>NEXUS<br />FORGE</h1>
      <p class="subtitle">Premium desktop systems are initializing. Please wait while your workspace and services come online.</p>

      <section class="loader">
        <div class="phase" id="phaseText">Initializing Core Systems...</div>
        <div class="bar"><span></span></div>
        <div class="tips" id="tipText">Workspace optimization enabled.</div>
      </section>
    </main>

    <script>
      const phases = [
        "Initializing Core Systems...",
        "Loading Workspace...",
        "Connecting Services...",
        "Verifying User Session...",
        "Checking for Updates...",
        "Preparing Dashboard...",
        "Startup Complete",
      ];

      const tips = [
        "Workspace optimization enabled.",
        "Background services initialized.",
        "Performance systems running normally.",
        "NEXUS FORGE synced successfully.",
      ];

      const phaseEl = document.getElementById("phaseText");
      const tipEl = document.getElementById("tipText");
      let phaseIndex = 0;
      let tipIndex = 0;

      setInterval(() => {
        phaseIndex = Math.min(phaseIndex + 1, phases.length - 1);
        phaseEl.textContent = phases[phaseIndex];
      }, 650);

      setInterval(() => {
        tipIndex = (tipIndex + 1) % tips.length;
        tipEl.textContent = tips[tipIndex];
      }, 1100);

      const particlesHost = document.getElementById("particles");
      const count = 42;
      for (let i = 0; i < count; i += 1) {
        const el = document.createElement("div");
        el.className = "particle";
        el.style.left = `${Math.random() * 100}vw`;
        el.style.top = `${55 + Math.random() * 45}vh`;
        el.style.animationDuration = `${3 + Math.random() * 4}s`;
        el.style.animationDelay = `${Math.random() * 3}s`;
        particlesHost.appendChild(el);
      }
    </script>
  </body>
</html>
