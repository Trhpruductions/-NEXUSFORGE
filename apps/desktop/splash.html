<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexusForge Launch</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-a: #070b12;
        --bg-b: #101a2a;
        --text: #e8eef8;
        --muted: #9db0cb;
        --line: rgba(157, 176, 203, 0.22);
        --accent: #f97316;
        --accent-2: #fb923c;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      body {
        margin: 0;
        display: grid;
        place-items: center;
        font-family: "Segoe UI Variable", "Bahnschrift", "Trebuchet MS", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 15% 20%, rgba(251, 146, 60, 0.2), transparent 28%),
          radial-gradient(circle at 82% 16%, rgba(56, 189, 248, 0.14), transparent 26%),
          linear-gradient(155deg, var(--bg-a) 0%, var(--bg-b) 100%);
        overflow: hidden;
      }

      .panel {
        width: min(420px, calc(100vw - 32px));
        border: 1px solid var(--line);
        border-radius: 20px;
        background: rgba(10, 16, 28, 0.74);
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
        padding: 28px 22px 20px;
        text-align: center;
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.5);
      }

      .logo-wrap {
        position: relative;
        width: 108px;
        height: 108px;
        margin: 0 auto 14px;
        display: grid;
        place-items: center;
      }

      .halo {
        position: absolute;
        inset: 0;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(251, 146, 60, 0.24), transparent 72%);
        animation: pulse 1.8s ease-in-out infinite;
      }

      .logo {
        position: relative;
        width: 86px;
        height: 86px;
        object-fit: contain;
        -webkit-user-select: none;
        user-select: none;
        filter: drop-shadow(0 8px 24px rgba(251, 146, 60, 0.28));
      }

      h1 {
        margin: 0;
        font-size: 1.05rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .phase {
        margin: 10px 0 4px;
        font-size: 1.02rem;
        color: #f8fafc;
      }

      .detail {
        margin: 0;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.45;
        min-height: 2.8em;
      }

      .dots {
        display: inline-flex;
        gap: 8px;
        margin: 14px 0 10px;
      }

      .dots span {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #cbd5e1;
        opacity: 0.35;
        animation: dot 1s ease-in-out infinite;
      }

      .dots span:nth-child(2) {
        animation-delay: 0.15s;
      }

      .dots span:nth-child(3) {
        animation-delay: 0.3s;
      }

      .meter {
        width: 100%;
        height: 8px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.22);
        overflow: hidden;
        margin-top: 8px;
      }

      .meter-fill {
        width: 8%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        transition: width 320ms ease;
      }

      .meta {
        margin-top: 10px;
        display: flex;
        justify-content: space-between;
        gap: 8px;
        font-size: 0.75rem;
        color: #aebfd6;
      }

      .update,
      .error {
        margin-top: 12px;
        border-radius: 12px;
        padding: 10px;
        font-size: 0.84rem;
        text-align: left;
      }

      .update {
        display: none;
        border: 1px solid rgba(251, 146, 60, 0.32);
        background: rgba(124, 45, 18, 0.26);
      }

      .error {
        display: none;
        border: 1px solid rgba(251, 113, 133, 0.4);
        background: rgba(131, 24, 67, 0.26);
      }

      .actions {
        margin-top: 8px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      button {
        border: 1px solid transparent;
        border-radius: 10px;
        padding: 8px 12px;
        font-weight: 600;
        cursor: pointer;
      }

      .btn-primary {
        background: linear-gradient(90deg, #fb923c, #f97316);
        color: #101827;
      }

      .btn-secondary {
        background: rgba(30, 41, 59, 0.9);
        border-color: rgba(148, 163, 184, 0.34);
        color: #e2e8f0;
      }

      .btn-primary:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.75;
        }
        50% {
          transform: scale(1.08);
          opacity: 1;
        }
      }

      @keyframes dot {
        0%,
        100% {
          transform: translateY(0);
          opacity: 0.3;
        }
        50% {
          transform: translateY(-3px);
          opacity: 1;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="panel" role="main" aria-label="NexusForge app loading screen" aria-busy="true">
      <div class="logo-wrap">
        <div class="halo" aria-hidden="true"></div>
        <img class="logo" src="./assets/nexusforge-main-logo.png" alt="NexusForge" draggable="false" />
      </div>

      <h1>NexusForge</h1>
      <p id="phaseText" class="phase">Opening app...</p>
      <p id="detailText" class="detail">Please wait while your workspace loads.</p>

      <div class="dots" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="meter" aria-hidden="true">
        <div id="meterFill" class="meter-fill"></div>
      </div>

      <div class="meta">
        <span id="modeText">Mode: Detecting</span>
        <span id="versionText">v-</span>
        <span id="meterValue">8%</span>
      </div>

      <section id="updatePanel" class="update" aria-live="polite">
        <div id="updateText">A desktop update is available.</div>
        <div class="actions">
          <button id="updateInstallBtn" class="btn-primary" type="button">Update now</button>
          <button id="updateSkipBtn" class="btn-secondary" type="button">Skip</button>
        </div>
      </section>

      <section id="errorPanel" class="error" role="alert">
        Startup failed. Retry opening the app.
        <div class="actions">
          <button id="errorRetryBtn" class="btn-primary" type="button">Retry</button>
        </div>
      </section>
    </main>

    <script>
      const defaultState = {
        stage: "Opening app...",
        detail: "Please wait while your workspace loads.",
        progress: 8,
      };

      const phaseText = document.getElementById("phaseText");
      const detailText = document.getElementById("detailText");
      const meterFill = document.getElementById("meterFill");
      const meterValue = document.getElementById("meterValue");
      const modeText = document.getElementById("modeText");
      const versionText = document.getElementById("versionText");

      const updatePanel = document.getElementById("updatePanel");
      const updateText = document.getElementById("updateText");
      const updateInstallBtn = document.getElementById("updateInstallBtn");
      const updateSkipBtn = document.getElementById("updateSkipBtn");

      const errorPanel = document.getElementById("errorPanel");
      const errorRetryBtn = document.getElementById("errorRetryBtn");

      let startupFailed = false;
      let startupTimeout = null;

      function clampProgress(value) {
        const numeric = Number(value);
        if (!Number.isFinite(numeric)) {
          return 8;
        }
        return Math.max(0, Math.min(100, Math.round(numeric)));
      }

      function formatVersion(version) {
        const clean = String(version || "").trim().replace(/^v/i, "");
        return clean ? `v${clean}` : "v-";
      }

      function setErrorVisible(visible) {
        errorPanel.style.display = visible ? "block" : "none";
      }

      function getFriendlyStage(stage) {
        const value = String(stage || "").toLowerCase();
        if (value.includes("open") || value.includes("ready")) {
          return "Opening app...";
        }
        if (value.includes("service") || value.includes("check") || value.includes("start") || value.includes("recover")) {
          return "Loading workspace...";
        }
        if (value.includes("boot") || value.includes("prepare") || value.includes("session")) {
          return "Starting up...";
        }
        return "Opening app...";
      }

      function getFriendlyDetail(state) {
        const launchMode = String(state?.launchMode || "").toLowerCase();
        if (launchMode === "hosted") {
          return "Please wait while your hosted workspace loads.";
        }
        return "Please wait while your workspace loads.";
      }

      function applyState(payload) {
        const state = { ...defaultState, ...(payload || {}) };
        const progress = clampProgress(state.progress);

        phaseText.textContent = getFriendlyStage(state.stage);
        detailText.textContent = getFriendlyDetail(state);
        meterValue.textContent = `${progress}%`;
        meterFill.style.width = `${Math.max(8, progress)}%`;

        const launchMode = String(state.launchMode || "").toLowerCase();
        if (launchMode === "hosted") {
          modeText.textContent = "Mode: Hosted";
        } else if (launchMode === "local-dev") {
          modeText.textContent = "Mode: Local";
        } else {
          modeText.textContent = "Mode: Detecting";
        }

        versionText.textContent = formatVersion(state.currentVersion || state.latestVersion);
      }

      function showUpdatePanel(updateState) {
        const hasUpdate = Boolean(updateState?.available);
        if (!hasUpdate) {
          updatePanel.style.display = "none";
          return;
        }

        const latest = formatVersion(updateState?.latestVersion);
        const forceRequired = Boolean(updateState?.forceRequired);
        const downloading = Boolean(updateState?.downloading);
        const downloaded = Boolean(updateState?.downloaded);

        if (downloading) {
          const pct = clampProgress(updateState?.downloadPercent || 0);
          updateText.textContent = `Downloading update ${latest} (${pct}%).`;
          updateInstallBtn.disabled = true;
          updateInstallBtn.textContent = "Downloading...";
          updateSkipBtn.style.display = forceRequired ? "none" : "inline-block";
        } else if (downloaded) {
          updateText.textContent = `Update ${latest} is ready to install.`;
          updateInstallBtn.disabled = false;
          updateInstallBtn.textContent = "Install now";
          updateSkipBtn.style.display = forceRequired ? "none" : "inline-block";
        } else {
          updateText.textContent = forceRequired
            ? `Required update ${latest} is available.`
            : `Update ${latest} is available.`;
          updateInstallBtn.disabled = false;
          updateInstallBtn.textContent = forceRequired ? "Install required update" : "Update now";
          updateSkipBtn.style.display = forceRequired ? "none" : "inline-block";
        }

        updatePanel.style.display = "block";
      }

      function wireUpdateActions() {
        updateInstallBtn.addEventListener("click", () => {
          if (!window.nexusforgeDesktop) {
            return;
          }

          const state = window.__lastUpdateState || {};
          const hasDownloaded = state?.available && state?.downloaded && state?.downloadedVersion === state?.latestVersion;

          updateInstallBtn.disabled = true;
          if (hasDownloaded && window.nexusforgeDesktop.restartForUpdate) {
            window.nexusforgeDesktop.resolveUpdatePrompt?.("install");
            window.nexusforgeDesktop.restartForUpdate();
            return;
          }

          updateInstallBtn.textContent = "Downloading...";
          window.nexusforgeDesktop.resolveUpdatePrompt?.("install");
          const downloadPromise = window.nexusforgeDesktop.downloadUpdateNow?.();
          if (downloadPromise && typeof downloadPromise.then === "function") {
            downloadPromise.catch(() => {
              updateInstallBtn.disabled = false;
              updateInstallBtn.textContent = "Update now";
              showUpdatePanel(window.__lastUpdateState || {});
            });
          }
        });

        updateSkipBtn.addEventListener("click", () => {
          updatePanel.style.display = "none";
          window.nexusforgeDesktop?.resolveUpdatePrompt?.("skip");
        });
      }

      function wireRetryAction() {
        errorRetryBtn.addEventListener("click", () => {
          startupFailed = false;
          setErrorVisible(false);
          if (window.nexusforgeDesktop?.retryAppLoad) {
            window.nexusforgeDesktop.retryAppLoad();
          } else {
            window.location.reload();
          }
        });
      }

      function wireStartupBridge() {
        if (window.nexusforgeDesktop?.onStartupState) {
          window.nexusforgeDesktop.onStartupState((state) => {
            if (startupFailed) {
              return;
            }
            clearTimeout(startupTimeout);
            applyState(state);
          });
          return;
        }

        const fallbackPhases = [
          { stage: "Starting up", detail: "Please wait while your workspace loads.", progress: 30 },
          { stage: "Loading workspace", detail: "Please wait while your workspace loads.", progress: 62 },
          { stage: "Opening app", detail: "Please wait while your workspace loads.", progress: 92 },
        ];

        let idx = 0;
        setInterval(() => {
          if (startupFailed) {
            return;
          }
          idx = Math.min(idx + 1, fallbackPhases.length - 1);
          applyState(fallbackPhases[idx]);
        }, 900);
      }

      function wireUpdateBridge() {
        if (window.nexusforgeDesktop?.getUpdateState) {
          window.nexusforgeDesktop
            .getUpdateState()
            .then((state) => {
              window.__lastUpdateState = state;
              versionText.textContent = formatVersion(state?.currentVersion || state?.latestVersion);
              showUpdatePanel(state);
            })
            .catch(() => {});
        }

        if (window.nexusforgeDesktop?.onUpdateState) {
          window.nexusforgeDesktop.onUpdateState((state) => {
            window.__lastUpdateState = state;
            versionText.textContent = formatVersion(state?.currentVersion || state?.latestVersion);
            showUpdatePanel(state);
          });
        }
      }

      applyState(defaultState);
      wireUpdateActions();
      wireRetryAction();
      wireStartupBridge();
      wireUpdateBridge();

      startupTimeout = setTimeout(() => {
        startupFailed = true;
        setErrorVisible(true);
      }, 60000);
    </script>
  </body>
</html>
