name: Admin Badge Smoke

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  admin-badge-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SECRETS_JSON: ${{ toJSON(secrets) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Load smoke secrets from payload
        shell: bash
        run: |
          node - <<'NODE' >> "$GITHUB_ENV"
          const secrets = JSON.parse(process.env.SECRETS_JSON || "{}");
          const keys = [
            "NEXUSFORGE_SMOKE_API_URL",
            "NEXUSFORGE_SMOKE_ADMIN_ACCESS_TOKEN",
            "NEXUSFORGE_SMOKE_ADMIN_EMAIL",
            "NEXUSFORGE_SMOKE_ADMIN_PASSWORD",
            "NEXUSFORGE_SMOKE_BADGE_TEST_USER_ID",
          ];

          const map = {
            NEXUSFORGE_SMOKE_API_URL: "NEXUSFORGE_API_URL",
            NEXUSFORGE_SMOKE_ADMIN_ACCESS_TOKEN: "NEXUSFORGE_ADMIN_ACCESS_TOKEN",
            NEXUSFORGE_SMOKE_ADMIN_EMAIL: "NEXUSFORGE_ADMIN_EMAIL",
            NEXUSFORGE_SMOKE_ADMIN_PASSWORD: "NEXUSFORGE_ADMIN_PASSWORD",
            NEXUSFORGE_SMOKE_BADGE_TEST_USER_ID: "NEXUSFORGE_BADGE_TEST_USER_ID",
          };

          for (const key of keys) {
            const envKey = map[key];
            const value = String(secrets[key] || "").replace(/\r?\n/g, "");
            console.log(`${envKey}=${value}`);
          }
          NODE

      - name: Resolve smoke config
        id: smoke_config
        shell: bash
        run: |
          has_api="false"
          has_token="false"
          has_creds="false"

          if [ -n "${NEXUSFORGE_API_URL}" ]; then
            has_api="true"
          fi

          if [ -n "${NEXUSFORGE_ADMIN_ACCESS_TOKEN}" ]; then
            has_token="true"
          fi

          if [ -n "${NEXUSFORGE_ADMIN_EMAIL}" ] && [ -n "${NEXUSFORGE_ADMIN_PASSWORD}" ]; then
            has_creds="true"
          fi

          ready="false"
          if [ "${has_api}" = "true" ] && { [ "${has_token}" = "true" ] || [ "${has_creds}" = "true" ]; }; then
            ready="true"
          fi

          echo "ready=${ready}" >> "$GITHUB_OUTPUT"

      - name: Run admin badge smoke test
        if: steps.smoke_config.outputs.ready == 'true'
        run: npm run admin:badge:smoke

      - name: Explain skipped smoke run
        if: steps.smoke_config.outputs.ready != 'true'
        run: |
          echo "Admin badge smoke test skipped."
          echo "Set repository secrets to enable this job:"
          echo "- NEXUSFORGE_SMOKE_API_URL"
          echo "- NEXUSFORGE_SMOKE_ADMIN_ACCESS_TOKEN (or NEXUSFORGE_SMOKE_ADMIN_EMAIL + NEXUSFORGE_SMOKE_ADMIN_PASSWORD)"
          echo "- Optional: NEXUSFORGE_SMOKE_BADGE_TEST_USER_ID"
