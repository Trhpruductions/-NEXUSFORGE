name: Brand Asset Verify

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  brand-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify brand assets
        run: npm run brand:verify
