name: discord-download-link-sync

on:
  push:
    branches:
      - main
      - master
    paths:
      - apps/web/public/desktop-update.json
      - apps/server/scripts/discord-post-download-embed.mjs
      - scripts/desktop-release-share.ps1
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: discord-download-link-sync
  cancel-in-progress: true

jobs:
  post-download-link:
    runs-on: ubuntu-latest
    env:
      SECRETS_JSON: ${{ toJSON(secrets) }}
      VARS_JSON: ${{ toJSON(vars) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate required Discord secrets
        shell: bash
        run: |
          node - <<'NODE' >> "$GITHUB_ENV"
          const secrets = JSON.parse(process.env.SECRETS_JSON || "{}");
          const vars = JSON.parse(process.env.VARS_JSON || "{}");

          const token = String(secrets.DISCORD_BOT_TOKEN || "").trim();
          const targetId = String(secrets.DISCORD_DOWNLOAD_TARGET_ID || "").trim();
          const reportGuildId = String(secrets.DISCORD_REPORT_GUILD_ID || "").trim();
          const guildId = String(secrets.DISCORD_GUILD_ID || "").trim();
          const resolvedTargetId = targetId || reportGuildId || guildId;
          const channelName = String(vars.DISCORD_DOWNLOAD_CHANNEL_NAME || "app-downloads").trim() || "app-downloads";
          const appWebUrl = String(vars.APP_WEB_URL || "").trim();

          if (!token) {
            console.error("DISCORD_BOT_TOKEN secret is missing.");
            process.exit(1);
          }
          if (!resolvedTargetId) {
            console.error("Set one of DISCORD_DOWNLOAD_TARGET_ID / DISCORD_REPORT_GUILD_ID / DISCORD_GUILD_ID.");
            process.exit(1);
          }

          console.log(`DISCORD_BOT_TOKEN=${token}`);
          console.log(`DISCORD_DOWNLOAD_TARGET_ID=${resolvedTargetId}`);
          console.log(`DISCORD_REPORT_GUILD_ID=${reportGuildId}`);
          console.log(`DISCORD_GUILD_ID=${guildId}`);
          console.log(`DISCORD_DOWNLOAD_CHANNEL_NAME=${channelName}`);
          console.log(`APP_WEB_URL=${appWebUrl}`);
          NODE

      - name: Install server workspace dependencies
        run: npm ci --workspace @nexusforge/server

      - name: Validate desktop-update.json schema
        run: npm run desktop:manifest:validate -w @nexusforge/server

      - name: Sync Discord app-downloads message
        run: npm run discord:post:download -w @nexusforge/server -- "$DISCORD_DOWNLOAD_TARGET_ID" "$DISCORD_DOWNLOAD_CHANNEL_NAME"