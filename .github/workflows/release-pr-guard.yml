name: Release PR Guard

on:
  pull_request:
    branches: ["main", "master"]
    paths:
      - apps/web/public/desktop-update.json
      - scripts/desktop-release-share.ps1
      - apps/server/scripts/discord-post-download-embed.mjs
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-desktop-manifest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install server workspace dependencies
        run: npm ci --workspace @nexusforge/server

      - name: Validate desktop-update.json schema
        run: npm run desktop:manifest:validate -w @nexusforge/server

  discord-sync-preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: validate-desktop-manifest
    env:
      SECRETS_JSON: ${{ toJSON(secrets) }}

    steps:
      - name: Validate Discord sync secrets
        shell: bash
        run: |
          node - <<'NODE'
          const secrets = JSON.parse(process.env.SECRETS_JSON || '{}');
          const token = String(secrets.DISCORD_BOT_TOKEN || '').trim();
          const target = String(secrets.DISCORD_DOWNLOAD_TARGET_ID || '').trim();
          const reportGuild = String(secrets.DISCORD_REPORT_GUILD_ID || '').trim();
          const guild = String(secrets.DISCORD_GUILD_ID || '').trim();

          const hasTarget = Boolean(target || reportGuild || guild);
          if (!token || !hasTarget) {
            console.error('Release PR Guard failed: missing required repository secrets for Discord download-link sync.');
            if (!token) {
              console.error('- DISCORD_BOT_TOKEN');
            }
            if (!hasTarget) {
              console.error('- One of DISCORD_DOWNLOAD_TARGET_ID / DISCORD_REPORT_GUILD_ID / DISCORD_GUILD_ID');
            }
            process.exit(1);
          }

          console.log('Discord sync secrets preflight passed.');
          NODE